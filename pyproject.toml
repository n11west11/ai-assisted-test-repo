[tool.poetry]
name = "ai-assisted-test-repo"
version = "0.1.0"
description = "A repository utilizing ai to create/execute/test any application you can throw at it"
authors = ["Nathan West"]
license = "MIT"
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.12"
openai = "^1.3.9"
fastapi = "^0.105.0"
uvicorn = {version = "^0.24.0.0.post1", extras = ["standard"]}
tiktoken = "^0.5.2"
pymongo = "^4.6.1"

[tool.poetry.group.dev.dependencies]
setuptools = "^69.0.2"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
